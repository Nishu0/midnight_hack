# local standalone midnight stack: proof server + indexer + node.
# start with:  docker compose up
# then point the frontend at the defaults in frontend/.env.example.

services:
  proof-server:
    container_name: nightpool-proof-server
    image: midnightntwrk/proof-server:8.0.3
    command: ["midnight-proof-server -v"]
    ports:
      - "6300:6300"
    environment:
      RUST_BACKTRACE: "full"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6300/version"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  indexer:
    container_name: nightpool-indexer
    image: midnightntwrk/indexer-standalone:4.0.1
    ports:
      - "8088:8088"
    environment:
      RUST_LOG: "indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,info"
      APP__INFRA__NODE__URL: "ws://node:9944"
      APP__APPLICATION__NETWORK_ID: "undeployed"
      APP__INFRA__STORAGE__PASSWORD: "indexer"
      APP__INFRA__PUB_SUB__PASSWORD: "indexer"
      APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD: "indexer"
      APP__INFRA__SECRET: "303132333435363738393031323334353637383930313233343536373839303132"
    healthcheck:
      test: ["CMD-SHELL", "cat /var/run/indexer-standalone/running"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      node:
        condition: service_started

  node:
    container_name: nightpool-node
    image: midnightntwrk/midnight-node:0.22.2
    ports:
      - "9944:9944"
    environment:
      CFG_PRESET: "dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 40s
